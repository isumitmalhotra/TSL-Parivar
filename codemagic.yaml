workflows:
  ios-workflow:
    name: iOS Build & Test
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
        - pattern: 'master'
          include: true
        - pattern: 'develop'
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install --repo-update

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos
        ignore_failure: true

      - name: Flutter test
        script: flutter test
        ignore_failure: true

      - name: Build iOS debug (Simulator)
        script: flutter build ios --simulator --debug

      - name: Build iOS release (for device/TestFlight)
        script: |
          flutter build ios --release --no-codesign
        ignore_failure: true

    artifacts:
      - build/ios/iphonesimulator/*.app
      - build/ios/ipa/*.ipa
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - dev@tslsteel.com  # TSL development team
        notify:
          success: true
          failure: true

  # Android workflow (bonus)
  android-workflow:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

